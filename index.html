<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Currency Incremental - Rune Calculator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com/"></script>
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Premium Game Fonts import kiye hain */
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Russo+One&display=swap');
        
        :root {
            --bg-main: #070b14;
            --panel-bg: rgba(17, 24, 39, 0.95);
            --neon-blue: #3b82f6;
            --neon-green: #22c55e;
            --neon-gold: #f59e0b;
            --neon-purple: #a855f7;
            --neon-red: #ef4444;
        }

        body { 
            font-family: 'Nunito', sans-serif; 
            background-color: var(--bg-main); 
            /* Subtle dotted background pattern */
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(59, 130, 246, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(34, 197, 94, 0.08) 0%, transparent 40%);
            background-attachment: fixed;
            color: #f8fafc; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Desktop scroll fix */
        }

        @media (max-width: 1023px) {
            body { overflow-y: auto; height: auto; } /* Mobile par normal scroll */
        }

        .font-game { font-family: 'Russo One', sans-serif; }

        /* Main Headers Styling */
        .title-gradient-green {
            background: linear-gradient(to bottom, #86efac 0%, #22c55e 50%, #166534 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }
        
        .title-gradient-blue {
            background: linear-gradient(to bottom, #93c5fd 0%, #3b82f6 50%, #1e3a8a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .glass-panel {
            background: var(--panel-bg);
            border: 3px solid #1f2937;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
        }

        /* Inputs Styling */
        .input-box {
            background-color: #0d1117;
            border: 2px solid #374151;
            color: #fff;
            font-family: 'Russo One', sans-serif;
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            transition: 0.2s;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.5);
        }
        .input-box:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
            outline: none;
        }

        /* Category Header Styling - Game UI match */
        .category-header {
            background: linear-gradient(90deg, #111827, #1f2937);
            border: 2px solid #374151;
            border-top: 4px solid var(--cat-color);
            border-radius: 16px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4), inset 0 0 40px rgba(var(--cat-color-rgb), 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
        }
        .category-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.02' fill-rule='evenodd'%3E%3Ccircle cx='3' cy='3' r='3'/%3E%3Ccircle cx='13' cy='13' r='3'/%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
        }
        .category-header::after {
            content: '';
            position: absolute;
            right: 0; top: 0; bottom: 0; width: 40%;
            background: linear-gradient(90deg, transparent, rgba(var(--cat-color-rgb), 0.15));
            pointer-events: none;
        }

        /* Rune Card Styling */
        .rune-card {
            background: linear-gradient(145deg, var(--tier-bg-dark), var(--tier-bg-light));
            border: 2px solid var(--tier-color);
            border-radius: 16px;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3), inset 0 0 30px rgba(var(--tier-color-rgb), 0.15);
        }
        .rune-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), 0 0 20px var(--tier-color);
            border-color: var(--tier-color);
        }
        .rune-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.03' fill-rule='evenodd'%3E%3Ccircle cx='5' cy='5' r='5'/%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
        }

        /* Toggle Button Styling */
        .toggle-btn {
            width: 48px; height: 26px; background: #374151; border: 2px solid #4b5563;
            border-radius: 99px; position: relative; cursor: pointer; transition: 0.3s;
        }
        .toggle-dot {
            position: absolute; top: 3px; left: 3px; width: 16px; height: 16px;
            background: white; border-radius: 50%; transition: 0.3s;
        }
        input:checked + .toggle-btn { background-color: var(--neon-green); border-color: #16a34a; }
        input:checked + .toggle-btn .toggle-dot { transform: translateX(22px); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        
        .stat-badge {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 3px 8px;
            border-radius: 6px;
            text-transform: uppercase;
        }
    </style>
</head>

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : '255, 255, 255';
        }

        function getCategoryColor(type) {
            if(type === "Coin Rune") return "#3cf03c"; 
            if(type === "Nature Rune") return "#fff021"; 
            if(type === "Cash Rune") return "#21b1ff"; 
            if(type === "Town Rune") return "#ff128a"; 
            return "#94a3b8";

            { name: "Global Core", type: "Town Rune", tier: "Celestial", chance: "174.99m", raw: "174.99m", stats: [] }
        ]; 

        window.sortConfig = { mode: 'category', direction: 'asc' };

        // Math Logic
        function parseValue(str) {
            if (!str) return 0;
            str = str.toString().toLowerCase().trim();
            if (str.includes('/')) str = str.split('/')[1]; 
            const sortedSuffixes = [...suffixes].sort((a, b) => b.sym.length - a.sym.length);
            for (let s of sortedSuffixes) {
                if (str.endsWith(s.sym)) {
                    return parseFloat(str.slice(0, -s.sym.length)) * s.val;
                }
            }
            return parseFloat(str) || 0;
        }

        function formatValue(num) {
            if (num === 0) return "0";
            if (num < 1000) return num.toFixed(2).replace(/\.00$/, '');
            for (let i = suffixes.length - 1; i >= 0; i--) {
                if (num >= suffixes[i].val) {
                    return (num / suffixes[i].val).toFixed(2).replace(/\.00$/, '') + suffixes[i].sym.charAt(0).toUpperCase() + suffixes[i].sym.slice(1);
                }
            }
            return num.toExponential(2);
        }

        function formatTime(seconds) {
            if (!isFinite(seconds) || seconds <= 0) return "--";
            if (seconds < 60) return seconds.toFixed(2) + "s";
            let min = Math.floor(seconds / 60);
            let sec = Math.floor(seconds % 60);
            if (min < 60) return `${min}m ${sec}s`;
            let hr = Math.floor(min / 60);
            min %= 60;
            if (hr < 24) return `${hr}h ${min}m`;
            let day = Math.floor(hr / 24);
            hr %= 24;
            return `${day}d ${hr}h`;
        }

        window.calculate = function() {
            const speedVal = parseFloat(document.getElementById('speed').value);
            const bulkVal = parseValue(document.getElementById('bulk').value);
            const luckVal = parseValue(document.getElementById('luck').value);
            const targetVal = parseValue(document.getElementById('target').value);

            const bulkBoost = document.getElementById('bulk2x').checked ? 1.5 : 1;
            const luckBoost = document.getElementById('luck2x').checked ? 1.5 : 1;
            const speedBoost = document.getElementById('speed2x').checked ? 1.5 : 1;

            let finalBulk = bulkVal * bulkBoost;
            let finalLuck = luckVal * luckBoost;
            let finalSpeed = (speedVal || 0.15) / speedBoost;

            const rps = finalBulk / (finalSpeed || 1);
            document.getElementById('effectiveRPS').innerText = formatValue(rps);

            const totalPower = rps * finalLuck;
            const etaEl = document.getElementById('customEta');

            if (totalPower > 0 && targetVal > 0) {
                const sec = targetVal / totalPower;
                etaEl.innerText = formatTime(sec);
                etaEl.style.color = sec > 3600 ? '#f87171' : (sec > 300 ? '#fbbf24' : '#4ade80');
            } else {
                etaEl.innerText = "--";
                etaEl.style.color = '#60a5fa';
            }
            
            updateGrid(totalPower);
        };

        window.setModeCategory = function() {
            window.sortConfig.mode = 'category';
            updateUI();
            window.calculate();
        };

        window.setModeEta = function() {
            if (window.sortConfig.mode === 'eta') {
                window.sortConfig.direction = window.sortConfig.direction === 'asc' ? 'desc' : 'asc';
            } else {
                window.sortConfig.mode = 'eta';
                window.sortConfig.direction = 'asc';
            }
            updateUI();
            window.calculate();
        };

        function updateUI() {
            const btnTotal = document.getElementById('modeTotal');
            const btnEta = document.getElementById('modeEta');
            const iconEta = document.getElementById('iconEta');

            if (window.sortConfig.mode === 'category') {
                btnTotal.className = "bg-blue-600 border-2 border-blue-400 px-6 py-2 rounded-xl text-xs font-game text-white shadow-lg active:scale-95 transition-transform uppercase whitespace-nowrap";
                btnEta.className = "bg-slate-900 border-2 border-slate-800 px-6 py-2 rounded-xl text-xs font-game text-slate-500 hover:text-blue-400 transition-all uppercase flex items-center gap-2";
                iconEta.className = "fas fa-sort-amount-up opacity-20";
            } else {
                btnEta.className = "bg-blue-600 border-2 border-blue-400 px-6 py-2 rounded-xl text-xs font-game text-white shadow-lg active:scale-95 transition-transform uppercase flex items-center gap-2";
                btnTotal.className = "bg-slate-900 border-2 border-slate-800 px-6 py-2 rounded-xl text-xs font-game text-slate-500 hover:text-blue-400 transition-all uppercase whitespace-nowrap";
                iconEta.className = window.sortConfig.direction === 'asc' ? "fas fa-sort-amount-up" : "fas fa-sort-amount-down";
            }
        }

        // Render Cards UI
        function updateGrid(power) {
            const grid = document.getElementById('runesGrid');
            const noRes = document.getElementById('noResults');
            const searchInput = document.getElementById('runeSearch');
            const searchTerm = searchInput ? searchInput.value.toLowerCase() : '';
            
            let filtered = runeData.filter(rune => 
                rune.name.toLowerCase().includes(searchTerm) || 
                rune.type.toLowerCase().includes(searchTerm) ||
                rune.tier.toLowerCase().includes(searchTerm)
            );

            // Sorting Logic
            filtered.sort((a, b) => {
                if (window.sortConfig.mode === 'category') {
                    const catA = categoryOrder.indexOf(a.type);
                    const catB = categoryOrder.indexOf(b.type);
                    if (catA !== catB) return catA - catB;
                    
                    const tierA = tierOrder.indexOf(a.tier);
                    const tierB = tierOrder.indexOf(b.tier);
                    if (tierA !== tierB) return tierA - tierB;
                    
                    return parseValue(a.raw) - parseValue(b.raw);
                } else {
                    const valA = parseValue(a.raw);
                    const valB = parseValue(b.raw);
                    return window.sortConfig.direction === 'asc' ? valA - valB : valB - valA;
                }
            });

            document.getElementById('modeTotal').innerText = `TOTAL RUNE: ${filtered.length}`;

            if (filtered.length === 0) {
                noRes.classList.remove('hidden');
                grid.innerHTML = '';
                return;
            }
            
            noRes.classList.add('hidden');
            grid.innerHTML = '';
            
            let currentCategory = '';

            filtered.forEach(rune => {
                const sec = power > 0 ? parseValue(rune.raw) / power : 0;
                const eta = formatTime(sec);
                const [typeColor, iconClass] = getCardStyle(rune.type);
                const catRgb = hexToRgb(typeColor);
                
                const tierColor = getTierColor(rune.tier);
                const tierRgb = hexToRgb(tierColor);
                const [bgDark, bgLight] = getTierBackground(tierColor, rune.tier);

                // Category Header UI Generator
                if (window.sortConfig.mode === 'category' && rune.type !== currentCategory) {
                    currentCategory = rune.type;
                    const catCount = filtered.filter(r => r.type === currentCategory).length;
                    
                    const header = document.createElement('div');
                    header.className = 'col-span-full mt-4 mb-2';
                    header.innerHTML = `
                        <div class="category-header" style="--cat-color: ${typeColor}; --cat-color-rgb: ${catRgb};">
                            <div class="flex items-center gap-3 md:gap-4 relative z-10">
                                <div class="w-12 h-12 rounded-xl flex items-center justify-center text-2xl shadow-lg border-2" style="background: rgba(${catRgb}, 0.15); color: ${typeColor}; border-color: rgba(${catRgb}, 0.3);">
                                    <i class="fas ${iconClass}"></i>
                                </div>
                                <h3 class="text-2xl md:text-3xl font-game tracking-widest uppercase" style="color: #fff; text-shadow: 0 2px 10px rgba(${catRgb}, 0.8), 0 2px 4px rgba(0,0,0,0.8);">
                                    ${currentCategory}
                                </h3>
                            </div>
                            <div class="bg-black/50 px-4 py-2 rounded-xl border border-white/10 flex flex-col items-center justify-center relative z-10 shadow-inner min-w-[80px]">
                                <span class="text-slate-400 text-[9px] font-black uppercase tracking-widest mb-0.5">Total</span>
                                <span class="text-white font-game text-xl leading-none drop-shadow-md">${catCount}</span>
                            </div>
                        </div>
                    `;
                    grid.appendChild(header);
                }

                const card = document.createElement('div');
                card.className = 'rune-card p-4 cursor-pointer';
                card.style.setProperty('--tier-color', tierColor); 
                card.style.setProperty('--tier-color-rgb', tierRgb); 
                card.style.setProperty('--tier-bg-dark', bgDark); 
                card.style.setProperty('--tier-bg-light', bgLight); 
                
                card.onclick = () => { 
                    document.getElementById('target').value = rune.raw; 
                    window.calculate();
                };
                
                // Secret tier ke liye clear visible styling
                let tierTextUI = '';
                if (rune.tier === 'Secret') {
                    tierTextUI = `<div class="text-[12px] font-game uppercase tracking-wider" style="color: #0f172a; -webkit-text-stroke: 1px #cbd5e1; text-shadow: 0 2px 10px rgba(255,255,255,0.4);">
                        ${rune.tier}
                    </div>`;
                } else {
                    tierTextUI = `<div class="text-[11px] font-game uppercase tracking-wider" style="color: ${tierColor}; text-shadow: 0 0 10px ${tierColor}80">
                        ${rune.tier}
                    </div>`;
                }

                card.innerHTML = `
                    <div class="relative z-10">
                        <div class="flex justify-between items-start mb-2">
                            <div class="text-[10px] font-black uppercase tracking-widest px-2 py-0.5 rounded border border-white/10 flex items-center gap-1.5" style="background: rgba(${catRgb}, 0.15); color: ${typeColor};">
                                <i class="fas ${iconClass}"></i> ${rune.type}
                            </div>
                            ${tierTextUI}
                        </div>
                        <h4 class="text-2xl font-game text-white mb-3 truncate" style="text-shadow: 0 2px 4px rgba(0,0,0,0.5)">${rune.name}</h4>
                        <div class="bg-black/50 rounded-lg p-2.5 border border-white/5 space-y-1.5">
                            <div class="flex justify-between text-[11px] font-bold">
                                <span class="text-slate-400">CHANCE:</span>
                                <span class="text-white font-game">1 in ${rune.chance}</span>
                            </div>
                            <div class="flex justify-between text-[11px] font-bold">
                                <span class="text-slate-400">ETA:</span>
                                <span class="text-blue-400 font-game">${eta}</span>
                            </div>
                        </div>
                        <div class="flex flex-wrap gap-1.5 mt-3">
                            ${rune.stats.map(s => `<span class="stat-badge" style="border-color: ${tierColor}40">${s}</span>`).join('')}
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // App initialization
        document.addEventListener('DOMContentLoaded', () => {
            const toggle = document.getElementById('toggleMobileMenu');
            const side = document.getElementById('sideContent');
            if(toggle) toggle.onclick = () => {
                side.classList.toggle('hidden');
                toggle.innerText = side.classList.contains('hidden') ? 'Settings' : 'Hide Settings';
            };
            
            // Events
            ['speed', 'bulk', 'luck', 'target', 'runeSearch'].forEach(id => document.getElementById(id).oninput = window.calculate);
            ['bulk2x', 'luck2x', 'speed2x'].forEach(id => document.getElementById(id).onchange = window.calculate);
            document.getElementById('modeTotal').onclick = window.setModeCategory;
            document.getElementById('modeEta').onclick = window.setModeEta;
            
            window.calculate();
        });
    </script>
</body>
</html>
